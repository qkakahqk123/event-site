<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events & Exhibitions</title>

<style>

/* ================= 기본 ================= */

html, body{
margin:0;
padding:0;
width:100%;
min-height:100vh;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url("background.jpg");
background-size:cover;
background-position:center;
text-align:center;
overflow-x:hidden;
}

/* ================= 제목 ================= */

h1{
color:white;
font-size:4vw;
margin-top:40px;
text-shadow:0 3px 10px rgba(0,0,0,0.6);
height:100px;
display:flex;
align-items:center;
justify-content:center;
}

/* ================= 언어 ================= */

.lang-bar{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:10px;
z-index:2000;
}

.flag{
width:45px;
cursor:pointer;
}

/* ================= 갤러리 ================= */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
max-width:1400px;
margin:50px auto;
padding:20px;
}

.thumbnail{
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.thumbnail:hover{
transform:scale(1.05);
}

/* ================= 팝업 ================= */

.popup,.qr-popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:1000;
opacity:0;
transition:opacity 0.35s ease;
}

.popup.show,.qr-popup.show{
opacity:1;
}

.popup-content{
background:white;
width:90%;
max-width:1000px;
padding:30px;
border-radius:15px;
display:flex;
gap:30px;
position:relative;
transform:scale(0.85);
transition:transform 0.35s ease;
}

.popup.show .popup-content{
transform:scale(1);
}

.popup-content img{
width:40%;
}

.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:30px;
border:none;
background:none;
cursor:pointer;
}

.info{
flex:1;
text-align:left;
line-height:1.7;
}

.action-buttons{
margin-top:20px;
display:flex;
gap:15px;
}

.action-buttons button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}

.lang{
display:none;
}

/* ================= QR ================= */

.qr-box{
background:white;
padding:30px;
border-radius:15px;
position:relative;
text-align:center;
}

.qr-box img{
width:300px;
}

.qr-close{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

/* ================= CAT ================= */

.cat-button{
position:fixed;
bottom:20px;
left:20px;
font-size:40px;
cursor:pointer;
z-index:1500;
transition:0.2s;
}

.cat-button:hover{
transform:scale(1.2);
}

</style>
</head>

<body>

<div class="lang-bar">
<img src="us.png" class="flag" onclick="setLang('en')">
<img src="jp.png" class="flag" onclick="setLang('jp')">
<img src="cn.png" class="flag" onclick="setLang('cn')">
</div>

<h1>Events & Exhibitions</h1>

<div class="gallery" id="gallery"></div>

<div id="popupContainer"></div>
<div id="qrContainer"></div>

<!-- CAT DONATION -->
<div id="catQR" class="qr-popup">
<div class="qr-box">
<div class="qr-close" onclick="closeQR('catQR')">✖</div>
<h3>Feed the cats 🐱</h3>
<img src="ritoqr.jpg">
</div>
</div>

<div class="cat-button" onclick="openQR('catQR')">🐱</div>

<!-- MAP -->
<div id="mapPopup" class="popup">
<div class="popup-content" style="flex-direction:column;max-width:900px;">
<button class="close-btn" onclick="closeMap()">✖</button>
<iframe id="mapFrame" width="100%" height="500" style="border:0;border-radius:10px;"></iframe>
</div>
</div>

<!-- SECRET -->
<div id="creatorPopup" class="popup">
<div class="popup-content" style="flex-direction:column;align-items:center;text-align:center;max-width:450px;">
<button class="close-btn" onclick="closePopup('creatorPopup')">✖</button>
<img src="creator.jpg" style="width:80%;border-radius:12px;">
<h2>Secret Developer</h2>
<p>Made by RITO 😎</p>
</div>
</div>

<audio id="secretAudio" src="secret.mp3"></audio>

<script>

/* ================= 이벤트 데이터 ================= */

const events=[

{
img:"beauty.png",
place:"코엑스서울",
qr:"beautyqr.png",
en:"<b>Beauty Expo</b><br>Date: May 20<br>Location: COEX",
jp:"<b>ビューティー展示会</b><br>日付: 5月20日<br>場所: COEX",
cn:"<b>美容展览</b><br>日期: 5月20日<br>地点: COEX"
},

{
img:"soju.png",
place:"명동대성당",
qr:"sojuqr.png",
en:"<b>Soju Festival</b><br>Date: June 15<br>Location: Seoul",
jp:"<b>焼酎フェスティバル</b><br>日付: 6月15日<br>場所: ソウル",
cn:"<b>烧酒节</b><br>日期: 6月15日<br>地点: 首尔"
},

{
img:"bts.png",
place:"카카오프렌즈 홍대 플래그십 스토어",
qr:"btsqr.png",
en:"<b>BTS Exhibition</b><br>Date: July 10<br>Location: Seoul",
jp:"<b>BTS 展示会</b><br>日付: 7月10日<br>場所: ソウル",
cn:"<b>BTS 展览</b><br>日期: 7月10日<br>地点: 首尔"
}

];

/* ================= 자동 생성 ================= */

const gallery=document.getElementById("gallery");
const popupContainer=document.getElementById("popupContainer");
const qrContainer=document.getElementById("qrContainer");

events.forEach((event,i)=>{

let id="popup"+i;
let qr="qr"+i;

gallery.innerHTML+=`
<img src="${event.img}" class="thumbnail" loading="lazy" onclick="openPopup('${id}')">
`;

popupContainer.innerHTML+=`

<div id="${id}" class="popup">

<div class="popup-content">

<button class="close-btn" onclick="closePopup('${id}')">✖</button>

<img src="${event.img}">

<div class="info">

<div class="lang en">${event.en}</div>
<div class="lang jp">${event.jp}</div>
<div class="lang cn">${event.cn}</div>

<div class="action-buttons">
<button onclick="openMapPopup('${event.place}')">📍 MAP</button>
<button onclick="openQR('${qr}')">📱 QR</button>
</div>

</div>
</div>
</div>
`;

qrContainer.innerHTML+=`

<div id="${qr}" class="qr-popup">
<div class="qr-box">
<div class="qr-close" onclick="closeQR('${qr}')">✖</div>
<img src="${event.qr}">
</div>
</div>
`;

});

/* ================= 언어 ================= */

let currentLang="en";

function setLang(lang){

currentLang=lang;

document.querySelectorAll(".lang").forEach(el=>el.style.display="none");

document.querySelectorAll("."+lang).forEach(el=>el.style.display="block");

}

/* ================= 팝업 ================= */

function openPopup(id){

document.querySelectorAll(".popup").forEach(p=>{

p.style.display="none";
p.classList.remove("show");

});

let popup=document.getElementById(id);

popup.style.display="flex";

setTimeout(()=>popup.classList.add("show"),10);

resetTimer();

}

function closePopup(id){

let popup=document.getElementById(id);

popup.classList.remove("show");

setTimeout(()=>popup.style.display="none",300);

}

/* ================= QR ================= */

function openQR(id){

let qr=document.getElementById(id);

qr.style.display="flex";

setTimeout(()=>qr.classList.add("show"),10);

}

function closeQR(id){

let qr=document.getElementById(id);

qr.classList.remove("show");

setTimeout(()=>qr.style.display="none",300);

}

/* ================= MAP ================= */

function openMapPopup(place){

let mapUrl="https://www.google.com/maps?q="+encodeURIComponent(place)+"&output=embed";

document.getElementById("mapFrame").src=mapUrl;

let popup=document.getElementById("mapPopup");

popup.style.display="flex";

setTimeout(()=>popup.classList.add("show"),10);

}

function closeMap(){

let popup=document.getElementById("mapPopup");

popup.classList.remove("show");

setTimeout(()=>popup.style.display="none",300);

}

/* ================= idle ================= */

let idleTime=0;

function timerIncrement(){

idleTime++;

if(idleTime>30){

resetScreen();

}

}

function resetTimer(){

idleTime=0;

}

function resetScreen(){

document.querySelectorAll(".popup,.qr-popup").forEach(p=>{

p.style.display="none";

p.classList.remove("show");

});

setLang("en");

}

document.addEventListener("mousemove",resetTimer);
document.addEventListener("click",resetTimer);
document.addEventListener("touchstart",resetTimer);

setInterval(timerIncrement,1000);

/* ================= ESC 닫기 ================= */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

document.querySelectorAll(".popup,.qr-popup").forEach(p=>{

p.classList.remove("show");

setTimeout(()=>p.style.display="none",300);

});

}

});

/* ================= 이스터에그 ================= */

let logoClickCount=0;

document.querySelector("h1").addEventListener("click",function(){

logoClickCount++;

if(logoClickCount>=5){

document.getElementById("secretAudio").play();

openPopup("creatorPopup");

logoClickCount=0;

}

setTimeout(()=>logoClickCount=0,2000);

});

window.onload=function(){

setLang("en");

}

</script>

</body>
</html>
