<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events & Exhibitions</title>

<style>

html,body{
margin:0;
padding:0;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url("background.jpg");
background-size:cover;
background-position:center;
text-align:center;
overflow-x:hidden;
}

h1{
color:white;
font-size:4vw;
margin-top:40px;
text-shadow:0 3px 10px rgba(0,0,0,0.6);
height:100px;
display:flex;
align-items:center;
justify-content:center;
}

.lang-bar{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:10px;
z-index:2000;
}

.flag{
width:45px;
cursor:pointer;
}

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
margin-top:50px;
max-width:1400px;
margin-left:auto;
margin-right:auto;
}

.thumbnail{
width:330px;
height:330px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.thumbnail:hover{
transform:scale(1.05);
}

.popup,.qr-popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:1000;
opacity:0;
transition:opacity 0.35s;
}

.popup.show,.qr-popup.show{
opacity:1;
}

.popup-content{
background:white;
width:90%;
max-width:1000px;
padding:30px;
border-radius:15px;
display:flex;
gap:30px;
position:relative;
transform:scale(0.85);
transition:transform 0.35s;
}

.popup.show .popup-content{
transform:scale(1);
}

.popup-content img{
width:40%;
}

.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:30px;
border:none;
background:none;
cursor:pointer;
}

.info{
flex:1;
text-align:left;
line-height:1.7;
}

.action-buttons{
margin-top:20px;
display:flex;
gap:15px;
}

.action-buttons button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
}

.lang{display:none;}

.qr-box{
background:white;
padding:30px;
border-radius:15px;
position:relative;
text-align:center;
}

.qr-box img{
width:300px;
}

.qr-close{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

.cat-button{
position:fixed;
bottom:20px;
left:20px;
font-size:40px;
cursor:pointer;
z-index:1500;
}

</style>
</head>

<body>

<div class="lang-bar">
<img src="us.png" class="flag" onclick="setLang('en')">
<img src="jp.png" class="flag" onclick="setLang('jp')">
<img src="cn.png" class="flag" onclick="setLang('cn')">
</div>

<h1 id="title">Events & Exhibitions</h1>

<div class="gallery"></div>

<!-- QR popup -->
<div id="qrPopup" class="qr-popup">
<div class="qr-box">
<div class="qr-close" onclick="closeQR()">✖</div>
<img id="qrImage">
</div>
</div>

<!-- cat qr -->
<div id="catQR" class="qr-popup">
<div class="qr-box">
<div class="qr-close" onclick="closeQR('catQR')">✖</div>
<h3>Feed the cats 🐱</h3>
<img src="ritoqr.jpg">
</div>
</div>

<div class="cat-button" onclick="openQR('ritoqr.jpg')">🐱</div>

<!-- map popup -->
<div id="mapPopup" class="popup">
<div class="popup-content" style="flex-direction:column;">
<button class="close-btn" onclick="closeMap()">✖</button>
<iframe id="mapFrame" width="100%" height="500" style="border:0;border-radius:10px;"></iframe>
</div>
</div>

<!-- easter egg -->
<div id="creatorPopup" class="popup">
<div class="popup-content" style="flex-direction:column;align-items:center;text-align:center;max-width:450px;">
<button class="close-btn" onclick="closePopup('creatorPopup')">✖</button>
<img src="creator.jpg" style="width:80%;border-radius:12px;">
<h2>Secret Developer</h2>
<p>Made by RITO 😎</p>
</div>
</div>

<audio id="secretAudio" src="secret.mp3"></audio>

<script>

/* =========================
EVENT DATA
========================= */

const events=[

{
id:"beauty",
image:"beauty.png",
map:"코엑스서울",
qr:"beautyqr.png",
text:{
en:{title:"Beauty Expo",date:"May 20",location:"COEX"},
jp:{title:"ビューティー展示会",date:"5月20日",location:"COEX"},
cn:{title:"美容展览",date:"5月20日",location:"COEX"}
}
},

{
id:"soju",
image:"soju.png",
map:"명동대성당",
qr:"sojuqr.png",
text:{
en:{title:"Soju Festival",date:"June 15",location:"Seoul"},
jp:{title:"焼酎フェスティバル",date:"6月15日",location:"ソウル"},
cn:{title:"烧酒节",date:"6月15日",location:"首尔"}
}
},

{
id:"bts",
image:"bts.png",
map:"카카오프렌즈 홍대 플래그십 스토어",
qr:"btsqr.png",
text:{
en:{title:"BTS Exhibition",date:"July 10",location:"Seoul"},
jp:{title:"BTS 展示会",date:"7月10日",location:"ソウル"},
cn:{title:"BTS 展览",date:"7月10日",location:"首尔"}
}
}

];

/* =========================
LANGUAGE
========================= */

let currentLang="en";

const titles={
en:"Events & Exhibitions",
jp:"イベント＆展示会",
cn:"活动与展览"
};

function setLang(lang){

currentLang=lang;

document.querySelectorAll(".lang").forEach(el=>el.style.display="none");
document.querySelectorAll("."+lang).forEach(el=>el.style.display="block");

document.getElementById("title").textContent=titles[lang];

}

/* =========================
CREATE EVENTS
========================= */

const gallery=document.querySelector(".gallery");

events.forEach(event=>{

let img=document.createElement("img");
img.src=event.image;
img.className="thumbnail";
img.onclick=()=>openPopup(event.id);

gallery.appendChild(img);

createPopup(event);

});

/* =========================
CREATE POPUP
========================= */

function createPopup(event){

let popup=document.createElement("div");
popup.className="popup";
popup.id=event.id;

popup.innerHTML=`

<div class="popup-content">

<button class="close-btn" onclick="closePopup('${event.id}')">✖</button>

<img src="${event.image}">

<div class="info">

<div class="lang en">
<b>Event Name</b><br>
${event.text.en.title}<br>
Date: ${event.text.en.date}<br>
Location: ${event.text.en.location}
</div>

<div class="lang jp">
<b>イベント名</b><br>
${event.text.jp.title}<br>
日付: ${event.text.jp.date}<br>
場所: ${event.text.jp.location}
</div>

<div class="lang cn">
<b>活动名称</b><br>
${event.text.cn.title}<br>
日期: ${event.text.cn.date}<br>
地点: ${event.text.cn.location}
</div>

<div class="action-buttons">

<button onclick="openMapPopup('${event.map}')">📍 MAP</button>

<button onclick="openQR('${event.qr}')">📱 QR</button>

</div>

</div>
</div>

`;

document.body.appendChild(popup);

}

/* =========================
POPUP
========================= */

function openPopup(id){

document.querySelectorAll(".popup").forEach(p=>{p.style.display="none";p.classList.remove("show");});

let popup=document.getElementById(id);

popup.style.display="flex";

setTimeout(()=>popup.classList.add("show"),10);

}

function closePopup(id){

let popup=document.getElementById(id);

popup.classList.remove("show");

setTimeout(()=>popup.style.display="none",300);

}

/* =========================
QR
========================= */

function openQR(src){

let qr=document.getElementById("qrPopup");

document.getElementById("qrImage").src=src;

qr.style.display="flex";

setTimeout(()=>qr.classList.add("show"),10);

}

function closeQR(){

let qr=document.getElementById("qrPopup");

qr.classList.remove("show");

setTimeout(()=>qr.style.display="none",300);

}

/* =========================
MAP
========================= */

function openMapPopup(place){

let mapUrl="https://www.google.com/maps?q="+encodeURIComponent(place)+"&output=embed";

document.getElementById("mapFrame").src=mapUrl;

let popup=document.getElementById("mapPopup");

popup.style.display="flex";

setTimeout(()=>popup.classList.add("show"),10);

}

function closeMap(){

let popup=document.getElementById("mapPopup");

popup.classList.remove("show");

setTimeout(()=>popup.style.display="none",300);

}

/* =========================
IDLE RESET
========================= */

let idleTime=0;

function timerIncrement(){

idleTime++;

if(idleTime>30){

resetScreen();

}

}

function resetScreen(){

document.querySelectorAll(".popup,.qr-popup").forEach(p=>{

p.style.display="none";

p.classList.remove("show");

});

setLang("en");

}

document.addEventListener("mousemove",()=>idleTime=0);
document.addEventListener("click",()=>idleTime=0);
document.addEventListener("touchstart",()=>idleTime=0);

setInterval(timerIncrement,1000);

/* =========================
EASTER EGG
========================= */

let logoClick=0;

document.getElementById("title").onclick=()=>{

logoClick++;

if(logoClick>=5){

document.getElementById("secretAudio").play();

openPopup("creatorPopup");

logoClick=0;

}

setTimeout(()=>logoClick=0,2000);

};

window.onload=()=>setLang("en");

</script>

</body>
</html>
