<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events & Exhibitions</title>

<style>

/* 기본 */

html,body{
margin:0;
padding:0;
width:100%;
min-height:100vh;
overflow-x:hidden;
font-family:Arial,sans-serif;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url("background.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

text-align:center;
}

h1{
font-size:4vw;
margin-top:3vh;
color:white;
text-shadow:0 3px 10px rgba(0,0,0,0.6);
}

/* 갤러리 */

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:3vw;
margin-top:4vh;
}

.thumbnail{

width:340px;
height:340px;

object-fit:cover;

border-radius:15px;

cursor:pointer;

transition:0.3s;

box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.thumbnail:hover{
transform:scale(1.05);
}

/* 팝업 */

.popup,.qr-popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.8);

justify-content:center;
align-items:flex-start;

padding-top:60px;

z-index:1000;

overflow-y:auto;

}

/* 팝업 애니메이션 */

.popup-content{

background:white;

width:90%;
max-width:1000px;

padding:2vw;

border-radius:15px;

display:flex;

flex-wrap:wrap;

gap:2vw;

align-items:center;

position:relative;

/* animation */

transform:scale(0.8);

opacity:0;

animation:popupZoom 0.35s ease forwards;

}

@keyframes popupZoom{

from{
transform:scale(0.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

/* 이미지 */

.popup-content img{

width:40%;
max-width:420px;

height:auto;

border-radius:10px;

object-fit:contain;

}

/* X 버튼 */

.close-btn{

position:absolute;

top:15px;
right:15px;

border:none;

background:transparent;

font-size:32px;

cursor:pointer;

color:#333;

z-index:10;

}

/* 설명 */

.info{

flex:1;

text-align:left;

line-height:1.6;

}

/* QR 버튼 */

.qrbtn{

margin-top:20px;

padding:12px 25px;

border:none;

border-radius:10px;

background:#222;

color:white;

font-size:16px;

cursor:pointer;

}

.qrbtn:hover{
background:black;
}

/* QR 박스 */

.qr-box{

background:white;

padding:30px;

border-radius:15px;

text-align:center;

transform:scale(0.8);

opacity:0;

animation:popupZoom 0.35s ease forwards;

}

.qr-box img{

width:60vw;
max-width:320px;

}

/* 모바일 */

@media screen and (max-width:768px){

html,body{
background-attachment:scroll;
}

h1{
font-size:7vw;
}

.thumbnail{
width:85vw;
height:85vw;
}

.popup-content{

flex-direction:column;

width:92%;

padding:20px;

}

.popup-content img{

width:100%;
max-width:420px;

}

.info{

width:100%;

font-size:15px;

}

}

</style>
</head>

<body>

<h1>전시 및 이벤트</h1>

<div class="gallery">

<img src="beauty.png" class="thumbnail" onclick="openPopup('popup1')">
<img src="soju.png" class="thumbnail" onclick="openPopup('popup2')">
<img src="bts.png" class="thumbnail" onclick="openPopup('popup3')">

</div>


<!-- POPUP 1 -->

<div id="popup1" class="popup">

<div class="popup-content">

<button class="close-btn" onclick="closePopup('popup1')">✖</button>

<img src="beauty.png">

<div class="info">

<b>한국어</b><br>
행사 이름 : 하하 호호<br>
날짜 : 언젠가<br>
장소 : 서울 어딘가<br>
가는 방법 : 택시<br>
설명 : 가보면 알아요<br><br>

<b>English</b><br>
Event Name : DDDD<br>
Date : DDDD<br>
Location : DDDD<br>
How to get there : DDDD<br>
Description : DDDD<br><br>

<b>日本語</b><br>
イベント名 : DDDD<br>
日付 : DDDD<br>
場所 : DDDD<br>
行き方 : DDDD<br>
説明 : DDDD<br><br>

<button class="qrbtn" onclick="openQR('qr1')">📍 MAP QR</button>

</div>

</div>
</div>


<!-- POPUP 2 -->

<div id="popup2" class="popup">

<div class="popup-content">

<button class="close-btn" onclick="closePopup('popup2')">✖</button>

<img src="soju.png">

<div class="info">

내용 작성

<button class="qrbtn" onclick="openQR('qr2')">📍 MAP QR</button>

</div>

</div>
</div>


<!-- POPUP 3 -->

<div id="popup3" class="popup">

<div class="popup-content">

<button class="close-btn" onclick="closePopup('popup3')">✖</button>

<img src="bts.png">

<div class="info">

내용 작성

<button class="qrbtn" onclick="openQR('qr3')">📍 MAP QR</button>

</div>

</div>
</div>


<!-- QR -->

<div id="qr1" class="qr-popup">

<div class="qr-box">

<img src="beautyqr.png">
<p>Scan QR for map</p>

</div>

</div>

<div id="qr2" class="qr-popup">

<div class="qr-box">

<img src="sojuqr.png">
<p>Scan QR for map</p>

</div>

</div>

<div id="qr3" class="qr-popup">

<div class="qr-box">

<img src="btsqr.png">
<p>Scan QR for map</p>

</div>

</div>


<script>

/* 팝업 */

function openPopup(id){

document.querySelectorAll(".popup").forEach(p=>p.style.display="none");

const popup=document.getElementById(id);

popup.style.display="flex";

popup.scrollTop=0;

resetTimer();

}

function closePopup(id){

document.getElementById(id).style.display="none";

resetTimer();

}

/* QR */

function openQR(id){

document.querySelectorAll(".qr-popup").forEach(p=>p.style.display="none");

document.getElementById(id).style.display="flex";

resetTimer();

}

/* 배경 터치 닫기 */

document.querySelectorAll(".popup").forEach(popup=>{

popup.addEventListener("click",function(e){

if(e.target===popup){

popup.style.display="none";

}

});

});

document.querySelectorAll(".qr-popup").forEach(popup=>{

popup.addEventListener("click",function(e){

if(e.target===popup){

popup.style.display="none";

}

});

});


/* 자동 초기화 */

let idleTime=0;
let idleLimit=30;

function timerIncrement(){

idleTime++;

if(idleTime>=idleLimit){

resetScreen();

}

}

function resetScreen(){

document.querySelectorAll(".popup").forEach(p=>p.style.display="none");

document.querySelectorAll(".qr-popup").forEach(p=>p.style.display="none");

}

function resetTimer(){
idleTime=0;
}

document.addEventListener("mousemove",resetTimer);
document.addEventListener("click",resetTimer);
document.addEventListener("touchstart",resetTimer);

setInterval(timerIncrement,1000);


/* 첫 터치 전체화면 */

function enableFullscreenOnce(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen().catch(()=>{});

}

document.removeEventListener("click",enableFullscreenOnce);
document.removeEventListener("touchstart",enableFullscreenOnce);

}

document.addEventListener("click",enableFullscreenOnce);
document.addEventListener("touchstart",enableFullscreenOnce);

</script>

</body>
</html>
